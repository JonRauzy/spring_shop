spring.application.name=spring_shop

# ── Application ──────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL datasource ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/spring_shop
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# "update"  → Hibernate adjusts the schema automatically (great for development).
# For production you would switch this to "validate" and use Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update

# Print every SQL statement Hibernate generates (useful while learning)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we are talking to PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
# Swagger UI is available at: http://localhost:8080/swagger-ui/index.html
# Raw OpenAPI JSON at:        http://localhost:8080/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs